<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đoán Chuỗi Từ 1vs1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Screen 1: Main Menu -->
    <div id="mainMenu" class="screen active">
      <div class="container">
        <h1>ĐOÁN CHUỖI TỪ</h1>
        <div class="form-group">
          <label>Tên của bạn:</label>
          <input type="text" id="playerName" placeholder="Nhập tên...">
        </div>
        <button id="createRoomBtn" class="btn btn-primary">Tạo phòng</button>
        <button id="joinRoomBtn" class="btn btn-secondary">Vào phòng</button>
      </div>
    </div>

    <!-- Screen 2: Create Room -->
    <div id="createRoomScreen" class="screen">
      <div class="container">
        <h1>TẠO PHÒNG</h1>
        <div class="form-group">
          <label>Tên của bạn:</label>
          <input type="text" id="createPlayerName" placeholder="Nhập tên...">
        </div>
        <div class="form-group">
          <label>Số lượng từ cần đoán:</label>
          <select id="wordCount">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5" selected>5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <button id="confirmCreateBtn" class="btn btn-primary">Tạo phòng</button>
        <button id="backFromCreateBtn" class="btn btn-secondary">Quay lại</button>
      </div>
    </div>

    <!-- Screen 3: Join Room -->
    <div id="joinRoomScreen" class="screen">
      <div class="container">
        <h1>VÀO PHÒNG</h1>
        <div class="form-group">
          <label>Tên của bạn:</label>
          <input type="text" id="joinPlayerName" placeholder="Nhập tên...">
        </div>
        <div class="form-group">
          <label>Mã phòng:</label>
          <input type="text" id="roomCode" placeholder="Nhập mã phòng...">
        </div>
        <button id="confirmJoinBtn" class="btn btn-primary">Vào phòng</button>
        <button id="backFromJoinBtn" class="btn btn-secondary">Quay lại</button>
      </div>
    </div>

    <!-- Screen 4: Waiting Room -->
    <div id="waitingRoom" class="screen">
      <div class="container">
        <h1>PHÒNG: <span id="displayRoomCode"></span></h1>
        
        <div class="players-list">
          <h3>Người chơi:</h3>
          <ul id="playersList"></ul>
        </div>

        <div class="form-group">
          <label>Số lượng từ: <span id="displayWordCount"></span></label>
        </div>

        <div class="secret-words-section">
          <h3>Nhập chuỗi bí mật của bạn:</h3>
          <div id="secretWordsInputs"></div>
        </div>

        <button id="readyBtn" class="btn btn-primary" disabled>Sẵn sàng</button>
        
        <div class="status-message">
          <p id="waitingStatus">Đang chờ đối thủ...</p>
        </div>
      </div>
    </div>

    <!-- Screen 5: Game Play -->
    <div id="gameScreen" class="screen">
      <div class="container">
        <h1>PHÒNG: <span id="gameRoomCode"></span></h1>
        
        <div class="game-header">
          <h2><span id="player1Name"></span> vs <span id="player2Name"></span></h2>
        </div>

        <div class="turn-indicator">
          <p>Lượt hiện tại: <strong id="currentTurnPlayer"></strong></p>
        </div>

        <div class="guessing-section">
          <h3>Chuỗi bí mật của bạn:</h3>
          <div class="word-chain my-words" id="mySecretWords">
            <!-- My secret words will be rendered here -->
          </div>
          
          <h3>Bạn đang đoán chuỗi của: <strong id="opponentName"></strong></h3>
          
          <div class="word-chain">
            <h4>Chuỗi cần đoán:</h4>
            <div id="maskedWords"></div>
          </div>

          <div class="guess-input" id="guessInputSection">
            <input type="text" id="guessInput" placeholder="Nhập từ tiếp theo...">
            <button id="guessBtn" class="btn btn-primary">Đoán</button>
          </div>
        </div>

        <div class="progress-section">
          <h4>Tiến độ:</h4>
          <div id="progressDisplay"></div>
        </div>

        <div class="history-section">
          <h4>Lịch sử:</h4>
          <div id="historyDisplay"></div>
        </div>
      </div>
    </div>

    <!-- Screen 6: Game Finished -->
    <div id="finishedScreen" class="screen">
      <div class="container">
        <h1>KẾT THÚC</h1>
        <div class="winner-announcement">
          <h2 id="winnerText"></h2>
        </div>
        <button id="backToMenuBtn" class="btn btn-primary">Về menu chính</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
